<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>地市级地方政府专项债项目全景（2019–2025）</title>
<style>
  :root{
    --bg:#f3f5f8; --card:#ffffff; --ink:#1c2a3a; --sub:#64748b;
    --line:#e4e9f0; --accent:#2563a8; --accent2:#d94e2a;
    --soft:#f7f9fc; --hover:#f0f6fd; --chipbg:#eef5fc;
    --hintbg:rgba(255,255,255,.88); --maskbg:rgba(15,25,40,.45);
    --shadow:0 1px 3px rgba(16,35,60,.05),0 10px 30px rgba(16,35,60,.08);
  }
  body.dark{
    --bg:#0b1422; --card:#111e33; --ink:#e6edf7; --sub:#8ea3c0;
    --line:rgba(148,180,220,.14); --accent:#5aa9f2; --accent2:#ff9a6b;
    --soft:#0e1929; --hover:#1a2c4d; --chipbg:#152640;
    --hintbg:rgba(13,23,40,.85); --maskbg:rgba(2,6,14,.6);
    --shadow:0 1px 3px rgba(0,0,0,.3),0 12px 34px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
       background:var(--bg); color:var(--ink); overflow:hidden;
       transition:background .3s ease, color .3s ease;}
  #app{display:flex; flex-direction:column; height:100vh;}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}

  header{background:var(--card); border-bottom:1px solid var(--line); padding:12px 20px 10px;
         display:flex; align-items:center; gap:18px; flex-wrap:wrap; position:relative;}
  header::before{content:""; position:absolute; top:0; left:0; right:0; height:3px;
         background:linear-gradient(90deg,#2563a8 0%,#5fb2ff 45%,#d4a04c 100%);}
  header h1{font-size:19px; font-weight:700; letter-spacing:.5px;}
  header .note{font-size:12px; color:var(--sub); font-weight:400; letter-spacing:.3px;}
  .logo{height:34px; width:auto; display:none; flex:none;}
  body.dark .logo.lw{display:block;}
  body:not(.dark) .logo.lb{display:block;}
  .tabs{display:flex; gap:4px; margin-right:4px;}
  .tabs a{font-size:13px; text-decoration:none; color:var(--sub); border:1px solid var(--line);
          border-radius:8px; padding:4px 13px; transition:all .15s ease; white-space:nowrap;}
  .tabs a:hover{border-color:var(--accent); color:var(--accent);}
  .tabs a.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .kpis{display:flex; gap:22px; margin-left:auto; align-items:center;}
  .kpi{text-align:right;}
  .kpi .v{font-size:20px; font-weight:700; color:var(--accent);
          font-variant-numeric:tabular-nums; letter-spacing:.3px; line-height:1.15;}
  .kpi .l{font-size:11px; color:var(--sub); letter-spacing:.4px;}

  #toolbar{background:var(--card); border-bottom:1px solid var(--line); padding:9px 20px;
           display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .yearbtns{display:flex; gap:4px;}
  .yearbtns button{border:1px solid var(--line); background:var(--card); padding:4px 11px;
                   border-radius:7px; cursor:pointer; font-size:13px; color:var(--ink);
                   transition:all .15s ease;}
  .yearbtns button:hover{border-color:var(--accent); color:var(--accent);}
  .yearbtns button.on{background:var(--accent); color:#fff; border-color:var(--accent);
                   box-shadow:0 2px 8px rgba(37,99,168,.35);}
  select,input[type=text]{border:1px solid var(--line); border-radius:7px; padding:5px 9px;
        font-size:13px; background:var(--card); color:var(--ink); max-width:240px;
        transition:border-color .15s ease;}
  select:hover,input[type=text]:hover{border-color:var(--accent);}
  select:focus,input[type=text]:focus{outline:none; border-color:var(--accent);}
  #toolbar label{font-size:12px; color:var(--sub); letter-spacing:.3px;}
  #backBtn{display:none; border:1px solid var(--accent); color:var(--accent); background:transparent;
           border-radius:7px; padding:4px 13px; cursor:pointer; font-size:13px; transition:all .15s;}
  #backBtn:hover{background:var(--accent); color:#fff;}
  .chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{border:1px dashed var(--accent); color:var(--accent); background:var(--chipbg);
        border-radius:12px; padding:2px 11px; font-size:12px; cursor:pointer; transition:all .15s;}
  .chip:hover{background:var(--accent); color:#fff; border-style:solid;}

  #main{flex:1; position:relative; min-height:0;}
  #map{position:absolute; inset:0;}

  /* 右侧面板 */
  #panel{position:absolute; top:0; right:-46%; width:46%; min-width:520px; height:100%;
         background:var(--card); border-left:1px solid var(--line);
         box-shadow:var(--shadow); transition:right .28s cubic-bezier(.4,0,.2,1);
         display:flex; flex-direction:column; z-index:20;}
  #panel.open{right:0;}
  #panel .phead{padding:13px 18px; border-bottom:1px solid var(--line);
                display:flex; align-items:center; gap:10px;}
  #panel .phead h2{font-size:18px; font-weight:700; letter-spacing:.4px;}
  #panel .phead .sub{font-size:12px; color:var(--sub);}
  #panel .phead button{margin-left:auto;}
  .btn{border:1px solid var(--line); background:var(--card); border-radius:7px; padding:4px 11px;
       cursor:pointer; font-size:12px; color:var(--ink); transition:all .15s ease;}
  .btn:hover{border-color:var(--accent); color:var(--accent);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  #panel .pkpis{display:flex; gap:22px; padding:11px 18px; border-bottom:1px solid var(--line);}
  #panel .pkpis .kpi{text-align:left;}
  #pcharts{display:flex; border-bottom:1px solid var(--line);}
  #trendChart{width:52%; height:190px;}
  #catChart{width:48%; height:190px;}
  #listbar{padding:8px 18px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
           border-bottom:1px solid var(--line);}
  #plist{flex:1; overflow:auto; padding:0 10px;}
  table.tbl{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.tbl th{position:sticky; top:0; background:var(--soft); color:var(--sub); font-weight:600;
               text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); white-space:nowrap;}
  table.tbl td{padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:top;}
  table.tbl tr.row{transition:background .12s ease;}
  table.tbl tr.row:hover{background:var(--hover); cursor:pointer;}
  td.num,th.num{text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums;}
  #pager{padding:8px 18px; display:flex; align-items:center; gap:10px; font-size:12px;
         color:var(--sub); border-top:1px solid var(--line);}
  .loading{padding:30px; text-align:center; color:var(--sub); font-size:13px;}

  /* 项目详情弹窗 */
  #mask{position:fixed; inset:0; background:var(--maskbg); display:none; z-index:50;
        backdrop-filter:blur(2px);}
  #modal{position:fixed; top:5vh; left:50%; transform:translateX(-50%); width:min(860px,94vw);
         max-height:88vh; background:var(--card); border-radius:12px; display:none; z-index:51;
         box-shadow:var(--shadow); flex-direction:column; border:1px solid var(--line);}
  #modal.open,#mask.open{display:flex;}
  #modal .mhead{padding:15px 22px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:flex-start;}
  #modal .mhead h3{font-size:16px; line-height:1.45; flex:1; font-weight:700;}
  #modal .mbody{overflow:auto; padding:8px 22px 22px;}
  .dt{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  .dt th{width:230px; text-align:right; color:var(--sub); font-weight:500; padding:5px 12px 5px 0;
         vertical-align:top; border-bottom:1px solid var(--line);}
  .dt td{padding:5px 0; border-bottom:1px solid var(--line); word-break:break-all;
         font-variant-numeric:tabular-nums;}
  .intro{background:var(--soft); border-radius:9px; padding:13px 15px; font-size:13px;
         line-height:1.8; margin-top:10px; color:var(--ink); border:1px solid var(--line);}
  .badge{display:inline-block; background:var(--chipbg); color:var(--accent); border-radius:5px;
         padding:2px 9px; font-size:12px; margin-right:6px;}
  #hint{position:absolute; left:14px; bottom:12px; font-size:11px; color:var(--sub);
        background:var(--hintbg); padding:5px 11px; border-radius:8px; z-index:5;
        backdrop-filter:blur(6px); border:1px solid var(--line);}
</style>

<script src="data/summary.js"></script>
<script src="data/geo_city.js"></script>

    <h3 id="mTitle">–</h3>
    <button class="btn" id="mClose">✕</button>
  </div>
  <div class="mbody" id="mBody"></div>
</div>

<script>
(function(){
"use strict";
var M = window.__META__, S = window.__SUMMARY__;
var YEARS = M.years, CATS = M.cats, UNITS = M.units, COLS = M.cols;
var ZX = {"110000":"北京市","120000":"天津市","310000":"上海市","500000":"重庆市"};
var provName = {}; M.provs.forEach(function(p){ provName[p[0]] = p[1]; });

/* ---------- 全局状态 ---------- */
var yearSel = 0;          // 0=全部, 否则具体年份
var catSel = -1;          // -1=全部
var view = "cn";          // "cn" 或 直辖市代码
var detailCache = {};     // code -> rows
var curUnit = null;       // 当前面板单元 code
var playTimer = null;

/* ---------- 工具 ---------- */
function fmt(x, d){ if(x==null||isNaN(x)) return "–";
  return Number(x).toLocaleString("zh-CN",{minimumFractionDigits:d==null?2:d, maximumFractionDigits:d==null?2:d}); }
function fmtInt(x){ return Number(x).toLocaleString("zh-CN"); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* 单元在当前年份/类别筛选下的 [融资记录数, 融资额, 去重项目数]
   y=0 时读取 "0" 档（跨年去重），避免同一项目多年融资被重复计数 */
function unitVal(code, y, c){
  var u = S[code]; if(!u) return [0,0,0];
  var cs = u[y ? String(y) : "0"]; if(!cs) return [0,0,0];
  var n=0, a=0, p=0;
  for(var ci in cs){
    if(c>=0 && String(c)!==ci) continue;
    n += cs[ci][0]; a += cs[ci][1]; p += cs[ci][2];
  }
  return [n, a, p];
}
/* 直辖市整体 = 其下所有单元之和 */
var zxUnits = {};  // provCode -> [unit codes]
Object.keys(UNITS).forEach(function(code){
  var u = UNITS[code];
  if(ZX[u[1]]){ (zxUnits[u[1]] = zxUnits[u[1]]||[]).push(code); }
});
function zxVal(pc, y, c){
  var n=0,a=0,p=0;
  (zxUnits[pc]||[]).forEach(function(code){ var v=unitVal(code,y,c); n+=v[0]; a+=v[1]; p+=v[2]; });
  return [n,a,p];
}

/* ---------- 地图注册 ---------- */
var cityGeo = window.__GEO_CITY__;
cityGeo.features = cityGeo.features.concat(window.__GEO_9DL__.features);
echarts.registerMap("cn_city", cityGeo);
Object.keys(window.__GEO_DIST__).forEach(function(pc){
  echarts.registerMap("dist_"+pc, window.__GEO_DIST__[pc]);
});

var geoNames = {};  // code -> 显示名（含港澳台等无数据区域）
cityGeo.features.forEach(function(f){ geoNames[f.properties.code] = f.properties.name; });
Object.keys(window.__GEO_DIST__).forEach(function(pc){
  window.__GEO_DIST__[pc].features.forEach(function(f){ geoNames[f.properties.code]=f.properties.name; });
});

/* ---------- 主题 ---------- */
function isDark(){ return document.body.classList.contains("dark"); }
function pal(){
  return isDark() ? {
    ramp:["#16304f","#1e4a79","#2e6cae","#4a90d9","#7fbcf7","#ffd98a"],
    noData:"#1e2f4e", border:"rgba(158,192,236,.55)", emph:"#ffd27f",
    tipBg:"rgba(14,26,46,.95)", tipTxt:"#e6edf7", tipBorder:"rgba(150,185,230,.25)",
    axis:"#8ea3c0", split:"rgba(148,180,220,.12)", title:"#8ea3c0",
    bar:"#4a90d9", bar2:"#6fa8dd", barSel:"#ffd98a", line:"#ff9a6b",
    catBar:"#5b93cc", catBarSel:"#e0955f", label:"#c6d6ec"
  } : {
    ramp:["#e8eff7","#a8c8e8","#5b93cc","#2f6db5","#1b4a86","#0d2f5e"],
    noData:"#e4e9f1", border:"#aebccd", emph:"#ffd27f",
    tipBg:"rgba(255,255,255,.97)", tipTxt:"#1c2a3a", tipBorder:"#e4e9f0",
    axis:"#6b7a90", split:"#eef1f5", title:"#6b7a90",
    bar:"#2f6db5", bar2:"#5b93cc", barSel:"#173f6e", line:"#d94e2a",
    catBar:"#5b93cc", catBarSel:"#e0784f", label:"#44536b"
  };
}
(function initTheme(){
  var t = "dark";
  try{ t = localStorage.getItem("svdTheme") || "dark"; }catch(e){}
  if(t==="dark") document.body.classList.add("dark");
})();

var chart = echarts.init(document.getElementById("map"));

/* 省级视图：从全国市级图中按省抽取要素并注册 */
var provMapReg = {};
function provMapName(pc){
  if(ZX[pc]) return "dist_"+pc;
  var name = "prov_"+pc;
  if(!provMapReg[name]){
    var pk = pc.slice(0,2);
    var feats = cityGeo.features.filter(function(f){
      var c = f.properties.code;
      if(c==="9DL") return false;
      if(pc==="460000" && c==="460300") return false;  /* 三沙远海岛礁不上省图，避免视野过大 */
      return c.slice(0,2)===pk;
    });
    echarts.registerMap(name, {type:"FeatureCollection", features:feats});
    provMapReg[name] = feats.map(function(f){return f.properties.code;});
  }
  return name;
}
function viewGeoCodes(){  /* 当前视图中有多边形的单元代码 */
  if(view==="cn") return null;
  if(ZX[view]){
    return window.__GEO_DIST__[view].features.map(function(f){return f.properties.code;});
  }
  return provMapReg["prov_"+view] || [];
}

function mapData(){
  var arr = [];
  if(view==="cn"){
    Object.keys(UNITS).forEach(function(code){
      if(UNITS[code][2]!=="c") return;
      var v = unitVal(code, yearSel, catSel);
      arr.push({name:code, value:v[1], cnt:v[0], prj:v[2]});
    });
    Object.keys(ZX).forEach(function(pc){
      var v = zxVal(pc, yearSel, catSel);
      arr.push({name:pc, value:v[1], cnt:v[0], prj:v[2], zx:1});
    });
  }else{
    var t = ZX[view] ? "d" : "c";
    Object.keys(UNITS).forEach(function(code){
      var u = UNITS[code];
      if(u[2]===t && u[1]===view){
        var v = unitVal(code, yearSel, catSel);
        arr.push({name:code, value:v[1], cnt:v[0], prj:v[2]});
      }
    });
  }
  return arr;
}

function vmMax(data){
  var vals = data.map(function(d){return d.value;}).filter(function(v){return v>0;}).sort(function(a,b){return a-b;});
  if(!vals.length) return 100;
  var q = vals[Math.min(vals.length-1, Math.floor(vals.length*0.95))];
  return Math.max(q, 10);
}

function renderMap(){
  var data = mapData();
  var P = pal();
  chart.setOption({
    tooltip:{
      trigger:"item", confine:true,
      backgroundColor:P.tipBg, borderColor:P.tipBorder, textStyle:{color:P.tipTxt},
      formatter:function(p){
        if(!p.data) {
          var nm = geoNames[p.name]||p.name;
          return nm==="九段线" ? "" : nm + "<br/>无收录数据";
        }
        var u = UNITS[p.name], nm2 = p.data.zx ? ZX[p.name] : (u?u[0]:geoNames[p.name]);
        var ys = yearSel? yearSel+"年" : "2019–2025";
        var ct = catSel>=0? " · "+CATS[catSel] : "";
        return "<b>"+nm2+"</b>　<span style='color:#8aa'>"+ys+ct+"</span><br/>"+
               "专项债融资：<b>"+fmt(p.data.value)+"</b> 亿元<br/>"+
               "项目数："+fmtInt(p.data.prj)+" 个<br/>"+
               "融资记录："+fmtInt(p.data.cnt)+" 条"+
               (p.data.zx? "<br/><span style='color:#d94e2a'>点击进入区县视图</span>":"");
      }
    },
    visualMap:{
      min:0, max:vmMax(data), calculable:true, left:14, top:14,
      text:["高","低"], textStyle:{fontSize:11, color:P.axis},
      inRange:{color:P.ramp},
      formatter:function(v){ return fmt(v,0)+" 亿"; }
    },
    series:[{
      id:"map", type:"map", map: view==="cn" ? "cn_city" : provMapName(view),
      nameProperty:"code", roam:true,
      zoom: view==="cn"?1.05:1,
      scaleLimit:{min:0.7, max:12},
      itemStyle:{ areaColor:P.noData, borderColor:P.border, borderWidth: view==="cn" ? 0.4 : 0.8 },
      emphasis:{ label:{show:true, fontSize:11, color:"#26324a", formatter:function(p){
                   return p.data && p.data.zx ? ZX[p.name] : (UNITS[p.name]? UNITS[p.name][0] : (geoNames[p.name]||"")); }},
                 itemStyle:{areaColor:P.emph} },
      select:{disabled:true},
      label:{show:view!=="cn", fontSize:10, color:P.label, formatter:function(p){
               return UNITS[p.name]? UNITS[p.name][0] : (geoNames[p.name]||""); }},
      data:data
    }]
  }, {notMerge:true});
  updateKpis(data);
}

function updateKpis(data){
  var n=0,a=0,u=0,pj=0;
  data.forEach(function(d){ if(d.cnt>0){n+=d.cnt; a+=d.value; pj+=d.prj; u++;} });
  /* 全国视图下补上省本级/虚拟单元（不在地图上） */
  if(view==="cn"){
    Object.keys(UNITS).forEach(function(code){
      var t = UNITS[code][2];
      if((t==="p"||t==="v") && !ZX[UNITS[code][1]]){
        var v = unitVal(code, yearSel, catSel);
        if(v[0]>0){ n+=v[0]; a+=v[1]; pj+=v[2]; u++; }
      }
    });
  }
  document.getElementById("kAmt").textContent = fmt(a,0);
  document.getElementById("kCnt").textContent = fmtInt(pj);
  document.getElementById("kRec").textContent = fmtInt(n);
  document.getElementById("kUnit").textContent = fmtInt(u);
}

chart.on("click", function(p){
  if(p.seriesType!=="map") return;
  var code = p.name;
  if(code==="9DL") return;
  if(view==="cn" && ZX[code]){ enterProv(code); return; }
  if(UNITS[code]) openPanel(code);
});
window.addEventListener("resize", function(){ chart.resize(); tChart&&tChart.resize(); cChart&&cChart.resize(); });

/* ---------- 省/直辖市下钻视图 ---------- */
function enterProv(pc){
  view = pc;
  provMapName(pc);  /* 确保地图已注册 */
  document.getElementById("backBtn").style.display="inline-block";
  buildProvChips(pc);
  renderMap();
}
document.getElementById("backBtn").onclick = function(){
  view="cn"; this.style.display="none";
  document.getElementById("zxChips").innerHTML="";
  document.getElementById("provSel").value="";
  document.getElementById("unitSel").innerHTML="<option value=''>选择地区…</option>";
  renderMap();
};
/* 省本级、无边界单元（两江新区/三沙等）以标签形式给出入口 */
function buildProvChips(pc){
  var box = document.getElementById("zxChips"); box.innerHTML="";
  var geoCodes = viewGeoCodes() || [];
  Object.keys(UNITS).forEach(function(code){
    var u = UNITS[code];
    if(u[1]!==pc) return;
    var onMap = geoCodes.indexOf(code)>=0;
    if(!onMap){
      var el = document.createElement("span");
      el.className="chip"; el.textContent=u[0]+" ↗";
      el.onclick=function(){ openPanel(code); };
      box.appendChild(el);
    }
  });
}

/* ---------- 工具栏 ---------- */
var yb = document.getElementById("yearBtns");
[0].concat(YEARS).forEach(function(y){
  var b = document.createElement("button");
  b.textContent = y===0?"全部":y;
  if(y===yearSel) b.className="on";
  b.onclick=function(){ yearSel=y; stopPlay();
    Array.prototype.forEach.call(yb.children,function(c){c.className="";});
    b.className="on"; renderMap(); };
  yb.appendChild(b);
});
function setYearBtn(y){
  Array.prototype.forEach.call(yb.children,function(c,i){
    c.className = ( (i===0&&y===0) || (i>0&&YEARS[i-1]===y) ) ? "on" : "";
  });
}
document.getElementById("playBtn").onclick=function(){
  if(playTimer){ stopPlay(); return; }
  this.textContent="⏸ 停止";
  var i = 0;
  yearSel = YEARS[0]; setYearBtn(yearSel); renderMap();
  playTimer = setInterval(function(){
    i++;
    if(i>=YEARS.length){ stopPlay(); yearSel=0; setYearBtn(0); renderMap(); return; }
    yearSel = YEARS[i]; setYearBtn(yearSel); renderMap();
  },1600);
};
function stopPlay(){ if(playTimer){clearInterval(playTimer); playTimer=null;}
  document.getElementById("playBtn").textContent="▶ 播放"; }

/* 类别下拉（按总融资额排序） */
var catTotals = CATS.map(function(c,i){
  var a=0;
  Object.keys(S).forEach(function(code){ var z=S[code]["0"];
    if(z && z[i]) a+=z[i][1]; });
  return [i,a];
}).sort(function(x,y){return y[1]-x[1];});
var catSelEl = document.getElementById("catSel");
catTotals.forEach(function(t){
  var o=document.createElement("option"); o.value=t[0];
  o.textContent=CATS[t[0]]+"（"+fmt(t[1],0)+"亿）";
  catSelEl.appendChild(o);
});
catSelEl.onchange=function(){ catSel=parseInt(this.value,10); renderMap(); };

/* 省→地区 快速定位 */
var provSelEl=document.getElementById("provSel"), unitSelEl=document.getElementById("unitSel");
M.provs.forEach(function(p){
  var has = Object.keys(UNITS).some(function(c){return UNITS[c][1]===p[0];});
  if(!has) return;
  var o=document.createElement("option"); o.value=p[0]; o.textContent=p[1];
  provSelEl.appendChild(o);
});
provSelEl.onchange=function(){
  var pc=this.value; unitSelEl.innerHTML="<option value=''>选择地区…</option>";
  if(!pc){  /* 取消选择 → 恢复全国视野 */
    if(view!=="cn"){ view="cn"; document.getElementById("backBtn").style.display="none";
                     document.getElementById("zxChips").innerHTML=""; }
    renderMap();
    return;
  }
  if(view!==pc) enterProv(pc);  /* 省份与直辖市统一：进入省内视图 */
  var list=Object.keys(UNITS).filter(function(c){return UNITS[c][1]===pc;})
    .sort(function(a,b){ var ta=UNITS[a][2],tb=UNITS[b][2];
      if(ta!==tb) return ta<tb?-1:1; return UNITS[a][0].localeCompare(UNITS[b][0],"zh"); });
  list.forEach(function(c){
    var o=document.createElement("option"); o.value=c;
    var tag={c:"",d:"",p:" · 本级",v:" · 未上图"}[UNITS[c][2]];
    o.textContent=UNITS[c][0]+tag;
    unitSelEl.appendChild(o);
  });
};
unitSelEl.onchange=function(){ if(this.value) openPanel(this.value); };

/* ---------- 城市面板 ---------- */
var tChart=null, cChart=null;
var listState={rows:null, y:"", c:"", kw:"", sort:"y", page:1, per:20};

function openPanel(code){
  curUnit=code;
  var u=UNITS[code];
  document.getElementById("pName").textContent=u[0];
  document.getElementById("pSub").textContent=provName[u[1]]+(u[2]==="v"?" · 该区域无对应地图边界":"");
  document.getElementById("panel").classList.add("open");
  var v=unitVal(code,0,-1);
  document.getElementById("pAmt").textContent=fmt(v[1]);
  document.getElementById("pCnt").textContent=fmtInt(v[2]);
  document.getElementById("pRec").textContent=fmtInt(v[0]);
  /* 最大类别 */
  var byCat={}; var z0=(S[code]||{})["0"]||{};
  for(var ci in z0){ byCat[ci]=(byCat[ci]||0)+z0[ci][1]; }
  var top=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];})[0];
  document.getElementById("pTop").textContent = top!=null&&top>=0? CATS[top] : "–";
  panelCatYear = 0;
  renderPanelCharts(code);
  /* 明细 */
  listState={rows:null,y:"",c:"",kw:"",sort:"y",page:1,per:20};
  document.getElementById("fYear").value=""; document.getElementById("fCat").value="";
  document.getElementById("fKw").value=""; document.getElementById("fSort").value="y";
  buildListCatOptions(code);
  loadDetail(code);
}
document.getElementById("closeBtn").onclick=function(){
  document.getElementById("panel").classList.remove("open"); curUnit=null; };

var panelCatYear = 0;  // 0=全部年份；点击趋势图柱子后为具体年份
function renderPanelCharts(code){
  renderTrend(code);
  renderCatChart(code);
  setTimeout(function(){tChart.resize();cChart.resize();},260);
}
function renderTrend(code){
  var P = pal();
  var su=S[code]||{};
  var amts=YEARS.map(function(y){ var c=su[y]; var a=0; if(c){for(var ci in c)a+=c[ci][1];}
    a=+a.toFixed(2);
    return (panelCatYear===y)? {value:a, itemStyle:{color:P.barSel}} : a; });
  var cnts=YEARS.map(function(y){ var c=su[y]; var n=0; if(c){for(var ci in c)n+=c[ci][0];} return n; });
  if(!tChart){
    tChart=echarts.init(document.getElementById("trendChart"));
    tChart.on("click", function(p){
      if(p.componentType!=="series") return;
      var y=YEARS[p.dataIndex];
      panelCatYear = (panelCatYear===y)? 0 : y;
      if(curUnit){ renderTrend(curUnit); renderCatChart(curUnit); }
    });
  }
  tChart.setOption({
    grid:{left:50,right:44,top:30,bottom:22},
    title:{text:"历年融资额与融资次数",subtext:"点击柱子可联动右侧类别构成",left:8,top:2,
           textStyle:{fontSize:12,color:P.title},subtextStyle:{fontSize:9,color:P.axis},itemGap:1},
    tooltip:{trigger:"axis",backgroundColor:P.tipBg,borderColor:P.tipBorder,textStyle:{color:P.tipTxt}},
    xAxis:{type:"category",data:YEARS,axisLabel:{fontSize:10,color:P.axis},
           axisLine:{lineStyle:{color:P.split}}},
    yAxis:[{type:"value",axisLabel:{fontSize:9,color:P.axis},splitLine:{lineStyle:{color:P.split}}},
           {type:"value",axisLabel:{fontSize:9,color:P.axis},splitLine:{show:false}}],
    series:[{type:"bar",name:"融资额(亿元)",data:amts,itemStyle:{color:P.bar,borderRadius:[3,3,0,0]},
             barMaxWidth:18,cursor:"pointer"},
            {type:"line",name:"融资次数(次)",yAxisIndex:1,data:cnts,itemStyle:{color:P.line},
             lineStyle:{width:2},symbolSize:5}]
  },{notMerge:true});
}
function renderCatChart(code){
  var P = pal();
  var su=S[code]||{};
  var z = su[panelCatYear? String(panelCatYear) : "0"]||{};
  var byCat={};
  for(var ci in z){ if(ci>=0) byCat[ci]=(byCat[ci]||0)+z[ci][1]; }
  var tops=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];}).slice(0,8).reverse();
  if(!cChart) cChart=echarts.init(document.getElementById("catChart"));
  cChart.setOption({
    grid:{left:8,right:50,top:30,bottom:10,containLabel:true},
    title:{text:"类别构成 Top8（按融资额 · "+(panelCatYear? panelCatYear+"年" : "全部年份")+"）",
           left:8,top:4,textStyle:{fontSize:12,color: panelCatYear? P.line : P.title}},
    tooltip:{trigger:"item",backgroundColor:P.tipBg,borderColor:P.tipBorder,textStyle:{color:P.tipTxt},
             formatter:function(p){return p.name+"："+fmt(p.value)+" 亿元";}},
    xAxis:{type:"value",axisLabel:{show:false},splitLine:{show:false}},
    yAxis:{type:"category",data:tops.map(function(i){var n=CATS[i];return n.length>12?n.slice(0,11)+"…":n;}),
           axisLabel:{fontSize:10,color:P.axis},axisLine:{lineStyle:{color:P.split}}},
    series:[{type:"bar",data:tops.map(function(i){return +byCat[i].toFixed(2);}),
             itemStyle:{color: panelCatYear? P.catBarSel : P.catBar, borderRadius:[0,3,3,0]},barMaxWidth:14,
             label:{show:true,position:"right",fontSize:9,color:P.axis,formatter:function(p){return fmt(p.value,0);}}}]
  },{notMerge:true});
}

function bigCat(row){ var i=M.catMap[row[2]]; return (i==null)? 11 : i; }
function buildListCatOptions(code){
  var sel=document.getElementById("fCat");
  sel.innerHTML="<option value=''>全部类别</option>";
  var z0=(S[code]||{})["0"]||{};
  Object.keys(z0).map(Number).sort(function(a,b){return a-b;}).forEach(function(i){
    var o=document.createElement("option"); o.value=String(i); o.textContent=CATS[i];
    sel.appendChild(o);
  });
  var fy=document.getElementById("fYear");
  if(fy.children.length===1){
    YEARS.forEach(function(y){ var o=document.createElement("option"); o.value=y; o.textContent=y+"年"; fy.appendChild(o); });
  }
}

/* 明细加载：动态 script（file:// 可用） */
window.__DETAIL_CB__=function(code, rows){
  detailCache[code]=rows;
  if(curUnit===code){ listState.rows=rows; listState.page=1; renderList(); }
};
function loadDetail(code){
  if(detailCache[code]){ listState.rows=detailCache[code]; renderList(); return; }
  document.getElementById("plist").innerHTML="<div class='loading'>正在加载项目明细…</div>";
  var s=document.createElement("script");
  s.src="data/detail/"+code+".js";
  s.onerror=function(){ document.getElementById("plist").innerHTML="<div class='loading'>明细文件加载失败（data/detail/"+code+".js）</div>"; };
  document.body.appendChild(s);
}

function filteredRows(){
  var r=listState.rows||[];
  var y=listState.y, c=listState.c, kw=listState.kw.trim().toLowerCase();
  var out=r.filter(function(row){
    if(y && String(row[36])!==y) return false;
    if(c!=="" && String(bigCat(row))!==c) return false;
    if(kw){
      var hay=((row[1]||"")+"|"+(row[12]||"")+"|"+(row[18]||"")+"|"+(row[14]||"")).toLowerCase();
      if(hay.indexOf(kw)<0) return false;
    }
    return true;
  });
  var s=listState.sort;
  if(s==="a") out.sort(function(a,b){return (b[10]||0)-(a[10]||0);});
  else if(s==="i") out.sort(function(a,b){return (num(b[3])||0)-(num(a[3])||0);});
  else out.sort(function(a,b){return (b[36]||0)-(a[36]||0) || (b[10]||0)-(a[10]||0);});
  return out;
}
function num(v){ if(typeof v==="number")return v; var f=parseFloat(v); return isNaN(f)?null:f; }

function renderList(){
  var rows=filteredRows();
  var per=listState.per, total=rows.length;
  var pages=Math.max(1,Math.ceil(total/per));
  if(listState.page>pages) listState.page=pages;
  var st=(listState.page-1)*per, page=rows.slice(st,st+per);
  var h=["<table class='tbl'><thead><tr><th>年份</th><th>项目名称</th><th>类别</th><th>区县</th>",
         "<th class='num'>专项债融资(亿)</th><th class='num'>项目总投资(亿)</th></tr></thead><tbody>"];
  page.forEach(function(r,i){
    h.push("<tr class='row' data-i='"+(st+i)+"'><td>"+ (r[36]||"–") +"</td><td>"+esc(r[1])+"</td><td>"+
      esc(r[2]||"–")+"</td><td>"+esc(r[18]||"–")+"</td><td class='num'>"+fmt(r[10])+
      "</td><td class='num'>"+ (num(r[3])!=null? fmt(num(r[3])) : esc(r[3]||"–")) +"</td></tr>");
  });
  h.push("</tbody></table>");
  if(!total) h=["<div class='loading'>没有符合筛选条件的项目</div>"];
  var el=document.getElementById("plist");
  el.innerHTML=h.join("");
  el.scrollTop=0;
  document.getElementById("pgInfo").textContent="共 "+fmtInt(total)+" 条融资记录（同一项目多年融资会出现多条） · 第 "+listState.page+" / "+pages+" 页";
  Array.prototype.forEach.call(el.querySelectorAll("tr.row"),function(tr){
    tr.onclick=function(){ openModal(rows[parseInt(this.dataset.i,10)]); };
  });
  document.getElementById("pgPrev").disabled = listState.page<=1;
  document.getElementById("pgNext").disabled = listState.page>=pages;
}
document.getElementById("pgPrev").onclick=function(){ if(listState.page>1){listState.page--; renderList();} };
document.getElementById("pgNext").onclick=function(){ listState.page++; renderList(); };
document.getElementById("fYear").onchange=function(){ listState.y=this.value; listState.page=1; renderList(); };
document.getElementById("fCat").onchange=function(){ listState.c=this.value; listState.page=1; renderList(); };
document.getElementById("fSort").onchange=function(){ listState.sort=this.value; renderList(); };
var kwT=null;
document.getElementById("fKw").oninput=function(){ var v=this.value;
  clearTimeout(kwT); kwT=setTimeout(function(){ listState.kw=v; listState.page=1; renderList(); },250); };

/* CSV 导出（当前筛选结果，全字段） */
document.getElementById("csvBtn").onclick=function(){
  if(!listState.rows) return;
  var rows=filteredRows();
  var lines=[COLS.map(csvq).join(",")];
  rows.forEach(function(r){ lines.push(r.map(csvq).join(",")); });
  var blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(UNITS[curUnit]?UNITS[curUnit][0]:"数据")+"_专项债项目.csv";
  a.click(); URL.revokeObjectURL(a.href);
};
function csvq(v){ if(v==null) return "";
  var s=String(v); return /[",\n]/.test(s)? '"'+s.replace(/"/g,'""')+'"' : s; }

/* ---------- 项目详情弹窗 ---------- */
function openModal(r){
  document.getElementById("mTitle").textContent=r[1]||"（未命名项目）";
  var h=["<div>"];
  h.push("<span class='badge'>"+esc(r[2]||"未分类")+"</span>");
  h.push("<span class='badge'>"+(r[36]||"?")+"年</span>");
  h.push("<span class='badge'>"+esc((r[16]||"")+" "+(r[17]||"")+" "+(r[18]||""))+"</span>");
  h.push("</div>");
  if(r[13]) h.push("<div class='intro'>"+esc(r[13])+"</div>");
  h.push("<table class='dt'>");
  var skip={1:1,13:1};
  COLS.forEach(function(cn,i){
    if(skip[i]) return;
    var v=r[i];
    if(v==null||v==="") return;
    var isMoney=/[(（]亿[)）]/.test(cn);
    var disp=(typeof v==="number") ? (isMoney? fmt(v):(cn==="序号"||cn==="年份"? String(v):fmt(v))) : esc(v);
    h.push("<tr><th>"+esc(cn)+"</th><td>"+disp+"</td></tr>");
  });
  h.push("</table>");
  document.getElementById("mBody").innerHTML=h.join("");
  document.getElementById("modal").classList.add("open");
  document.getElementById("mask").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open");
  document.getElementById("mask").classList.remove("open"); }
document.getElementById("mClose").onclick=closeModal;
document.getElementById("mask").onclick=closeModal;
document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeModal(); });

/* ---------- 主题切换 ---------- */
var themeBtn = document.getElementById("themeBtn");
function syncThemeBtn(){ themeBtn.textContent = isDark()? "☀️ 浅色" : "🌙 深色"; }
themeBtn.onclick = function(){
  document.body.classList.toggle("dark");
  try{ localStorage.setItem("svdTheme", isDark()? "dark":"light"); }catch(e){}
  syncThemeBtn();
  renderMap();
  if(curUnit){ renderTrend(curUnit); renderCatChart(curUnit); }
};
syncThemeBtn();

/* ---------- 启动 ---------- */
renderMap();
})();
</script>
</body>
</html>
